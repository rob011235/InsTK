name: Build and Deploy Blazor to Plesk

on:
  push:
    branches: ["main", "qa"]
  workflow_dispatch: {}

env:
  APP_NAME: InsTK
  SERVER_PROJECT_DIR: InsTK.Server
  SERVER_PROJECT_FILE: InsTK.Server.csproj
  DOTNET_VERSION: 10.0.x
  RUNTIME_ID: win-x64
  PUBLISH_DIR: ./publish

jobs:
  build-and-deploy:
    if: github.ref_name == 'main' || github.ref_name == 'qa'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment settings
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "DEPLOY_DOMAIN=instk.net" >> "$GITHUB_ENV"
            echo "DEPLOY_DIRECTORY=instk.net" >> "$GITHUB_ENV"
            echo "ALLOWED_HOSTS=instk.net" >> "$GITHUB_ENV"
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> "$GITHUB_ENV"
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> "$GITHUB_ENV"
            echo "SYNCFUSION_LICENSEKEY=${{ secrets.SYNCFUSION_LICENSEKEY }}" >> "$GITHUB_ENV"
            {
              echo "SQL_CONNECTION<<EOF"
              echo "${{ secrets.PROD_SQL_CONNECTION }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          elif [ "${GITHUB_REF_NAME}" = "qa" ]; then
            echo "DEPLOY_DOMAIN=staging.instk.net" >> "$GITHUB_ENV"
            echo "DEPLOY_DIRECTORY=staging.instk.net" >> "$GITHUB_ENV"
            echo "ALLOWED_HOSTS=staging.instk.net" >> "$GITHUB_ENV"
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> "$GITHUB_ENV"
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> "$GITHUB_ENV"
            echo "SYNCFUSION_LICENSEKEY=${{ secrets.SYNCFUSION_LICENSEKEY }}" >> "$GITHUB_ENV"
            {
              echo "SQL_CONNECTION<<EOF"
              echo "${{ secrets.STAGING_SQL_CONNECTION }}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "Unsupported branch '${GITHUB_REF_NAME}' for deployment." >&2
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SERVER_PROJECT_DIR }}/${{ env.SERVER_PROJECT_FILE }}

      - name: Create appsettings.Production.json
        run: |
          cat > ${{ env.SERVER_PROJECT_DIR }}/appsettings.Production.json <<EOF
          {
            "ConnectionStrings": {
              "DefaultConnection": "${SQL_CONNECTION}"
            },
            "Logging": {
              "LogLevel": {
                "Default": "Information",
                "Microsoft.AspNetCore": "Warning"
              }
            },
            "Admin": {
              "Email": "${ADMIN_EMAIL}",
              "Password": "${ADMIN_PASSWORD}"
            },
            "Syncfusion": {
              "LicenseKey": "${SYNCFUSION_LICENSEKEY}"
            },
            "AllowedHosts": "${ALLOWED_HOSTS}"
          }
          EOF

      - name: Build
        run: dotnet build ${{ env.SERVER_PROJECT_DIR }}/${{ env.SERVER_PROJECT_FILE }} --configuration Release --no-restore

      - name: Publish ${{ env.APP_NAME }} (self-contained)
        run: |
          dotnet publish \
            ${{ env.SERVER_PROJECT_DIR }}/${{ env.SERVER_PROJECT_FILE }} \
            --configuration Release \
            --runtime ${{ env.RUNTIME_ID }} \
            --self-contained true \
            -p:PublishTrimmed=false \
            --output ${{ env.PUBLISH_DIR }}

      - name: Verify web.config exists
        run: |
          test -f "${{ env.PUBLISH_DIR }}/web.config" \
            && echo "web.config present for ${{ env.APP_NAME }} on ${DEPLOY_DOMAIN} ✅" \
            || (echo "web.config missing ❌" && exit 1)

      - name: List published files
        run: ls -R ${{ env.PUBLISH_DIR }}

      - name: Create temporary app_offline.htm
        run: |
          cat > "${{ env.PUBLISH_DIR }}/app_offline.htm" <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Temporarily Offline</title>
          </head>
          <body>
            <h1>Temporarily Offline</h1>
            <p>Deployment is in progress. Please try again shortly.</p>
          </body>
          </html>
          EOF

      - name: Deactivate site for deployment
        run: |
          REMOTE_DIR="${DEPLOY_DIRECTORY#/}"
          curl --fail --silent --show-error --insecure --ftp-ssl --ssl-reqd \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --upload-file "${{ env.PUBLISH_DIR }}/app_offline.htm" \
            "ftp://${{ secrets.FTP_SERVER }}/${REMOTE_DIR}/app_offline.htm"

      - name: Wait for IIS to unload the app
        run: sleep 20

      - name: Deploy ${{ env.APP_NAME }} via FTPS to Plesk
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ${{ env.PUBLISH_DIR }}/
          server-dir: ${{ env.DEPLOY_DIRECTORY }}/
          exclude: |
            **/app_offline.htm
          timeout: 120000
          log-level: verbose
          dangerous-clean-slate: false

      - name: Reactivate site after deployment
        if: ${{ always() }}
        run: |
          REMOTE_DIR="${DEPLOY_DIRECTORY#/}"
          curl --fail --silent --show-error --insecure --ftp-ssl --ssl-reqd \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --quote "DELE ${REMOTE_DIR}/app_offline.htm" \
            "ftp://${{ secrets.FTP_SERVER }}/"
